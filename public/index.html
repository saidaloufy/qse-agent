<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSE Analyst Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the QSE Analyst Agent Interface</h1>
    </header>
    <main>
        <form id="analysis-form">
            <label for="input-data">Input Data:</label>
            <textarea id="input-data" name="input-data" rows="5" required></textarea>
            <br>
            <label for="select-options">Choose Analysis Type:</label>
            <select id="select-options" name="analysis-type">
                <option value="analysis1">Analysis 1</option>
                <option value="analysis2">Analysis 2</option>
                <option value="analysis3">Analysis 3</option>
            </select>
            <br>
            <button type="submit">Submit</button>
        </form>
        <div id="results">
            <!-- Results will be displayed here -->
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
